<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vitor Freitas</title>
  <meta name="description" content="Software engineer. I write code for a living. Sometimes for fun too." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --surface: #111111;
      --border: #222222;
      --text: #f0f0f0;
      --muted: #888888;
      --accent: #a07af0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }

    /* Hero */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 80px 24px 64px;
    }

    .hero-photo {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      margin-bottom: 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      object-fit: cover;
      background: var(--surface);
    }

    .hero h1 {
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 8px;
    }

    .hero-tagline {
      font-size: 20px;
      color: var(--text);
      margin-bottom: 6px;
    }

    .hero-sub {
      font-size: 15px;
      color: var(--muted);
      margin-bottom: 32px;
    }

    .social-links {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .social-links a {
      color: var(--muted);
      transition: color 0.2s;
      display: flex;
    }

    .social-links a:hover { color: var(--text); }

    .social-links svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
    }
  </style>
</head>
<body>

  <section class="hero">
    <img class="hero-photo" src="photo.jpg" alt="Vitor Freitas" />
    <h1>Vitor Freitas</h1>
    <p class="hero-tagline">I write code for a living. Sometimes for fun too.</p>
    <p class="hero-sub">Fintech engineer — previously Nubank, now Toast.</p>
    <div class="social-links">

  </section>

</body>
</html>
